<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #eeeeee;
      --box-color: #b2b2b2;
      --key-text-color: #eeeeee;
      --reset-color: #b2b2b2;
      --footer-color: #c4c4c4;
    }
    body {
      width: 220px;
      height: 160px;
      margin: 0;
      background-color: var(--bg-color);
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* Optical alignment: Atas lebih lega, bawah lebih rapet */
      padding: 24px 20px 14px 20px;
      box-sizing: border-box;
      user-select: none;
    }
    .main-content {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* Mendorong content agar persis berada di tengah sisa ruang */
      margin: auto 0;
    }
    .shortcut-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      width: 100%;
      margin-bottom: 6px;
    }
    .key-box {
      background-color: var(--box-color);
      color: var(--key-text-color);
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 800;
      font-size: 21px;
      text-transform: capitalize;
      transition: background-color 0.2s ease, color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
    }
    .key-box.char-box {
      text-transform: uppercase;
    }
    .default-text {
      color: var(--reset-color);
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      opacity: 1;
      letter-spacing: 0.5px;
    }
    .default-text:hover {
      opacity: 1;
      color: #f26db2;
    }
    .footer {
      color: var(--footer-color);
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 0.2px;
      margin-bottom: 0;
    }
    .akabi-link {
      color: inherit;
      font-weight: 600;
      text-decoration: none;
    }
    .akabi-link:hover {
      font-weight: 800;
      color: #f26db2;
  </style>
</head>
<body>
  <div class="main-content">
    <div class="shortcut-container" id="shortcut-container"></div>
    <div class="default-text" id="reset-default">Reset to default!</div>
  </div>
  <div class="footer"><a href="https://github.com/akabisan" target="_blank" class="akabi-link">(*´ω｀*)</a></div>

  <script src="popup.js"></script>
</body>
</html>
